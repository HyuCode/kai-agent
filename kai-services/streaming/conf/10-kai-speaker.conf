# kai の発話音声用 null-sink。speechd がここへ再生し、OBS が kai_speaker.monitor を取り込む。
# 設計: docs/kai/design/streaming.md §3.1
context.objects = [
    {   factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "kai_speaker"
            node.description = "kai speaker (stream audio)"
            media.class      = Audio/Sink
            audio.position   = [ FL FR ]
        }
    }
]
